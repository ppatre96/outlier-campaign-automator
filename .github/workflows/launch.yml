name: Launch Campaigns

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:      # manual trigger from GitHub UI

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Fonts + shaping for non-Latin creative overlays (Hindi/Bengali/Thai/
      # Arabic/CJK/Hangul…). Without these the compositor falls back to Inter,
      # which lacks the glyphs → "?" in the ad. libraqm0 enables Pillow's RAQM
      # layout engine (conjuncts/RTL); fonts-noto-* provide the glyph coverage
      # the script-aware _load_font expects at /usr/share/fonts/.../noto.
      - name: Install fonts + libraqm (non-Latin creative text)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libraqm0 fonts-noto-core fonts-noto-cjk fonts-noto-extra
          fc-list | grep -ci bengali | xargs -I{} echo "noto bengali faces: {}"  # non-fatal: surfaces missing Indic fonts (tofu guard reverts to English if absent)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Write Google credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- bash -c 'echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json'

      - name: Run launch pipeline
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- python3 main.py --mode launch

      - name: Persist refreshed LinkedIn tokens to Doppler
        if: always()
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ ! -f .env ]; then
            echo "No .env produced by run — nothing to persist."
            exit 0
          fi
          NEW_ACCESS=$(grep '^LINKEDIN_ACCESS_TOKEN=' .env | cut -d= -f2- || true)
          NEW_REFRESH=$(grep '^LINKEDIN_REFRESH_TOKEN=' .env | cut -d= -f2- || true)
          if [ -n "$NEW_ACCESS" ]; then
            doppler secrets set LINKEDIN_ACCESS_TOKEN="$NEW_ACCESS" --silent
            echo "Persisted refreshed LINKEDIN_ACCESS_TOKEN to Doppler."
          fi
          if [ -n "$NEW_REFRESH" ]; then
            doppler secrets set LINKEDIN_REFRESH_TOKEN="$NEW_REFRESH" --silent
            echo "Persisted refreshed LINKEDIN_REFRESH_TOKEN to Doppler."
          fi
          # Reddit ADS token refreshes-on-401 the same way — the pipeline writes
          # new values to .env; persist each non-empty one. (The media token uses
          # a browser-free password-grant mint, so there's nothing to persist.)
          for KEY in REDDIT_ACCESS_TOKEN REDDIT_REFRESH_TOKEN; do
            VAL=$(grep "^$KEY=" .env | cut -d= -f2- || true)
            if [ -n "$VAL" ]; then
              doppler secrets set "$KEY"="$VAL" --silent
              echo "Persisted refreshed $KEY to Doppler."
            fi
          done
