name: Launch Campaigns

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:      # manual trigger from GitHub UI

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Write Google credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- bash -c 'echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json'

      - name: Run launch pipeline
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- python3 main.py --mode launch

      - name: Persist refreshed LinkedIn tokens to Doppler
        if: always()
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ ! -f .env ]; then
            echo "No .env produced by run — nothing to persist."
            exit 0
          fi
          NEW_ACCESS=$(grep '^LINKEDIN_ACCESS_TOKEN=' .env | cut -d= -f2- || true)
          NEW_REFRESH=$(grep '^LINKEDIN_REFRESH_TOKEN=' .env | cut -d= -f2- || true)
          if [ -n "$NEW_ACCESS" ]; then
            doppler secrets set LINKEDIN_ACCESS_TOKEN="$NEW_ACCESS" --silent
            echo "Persisted refreshed LINKEDIN_ACCESS_TOKEN to Doppler."
          fi
          if [ -n "$NEW_REFRESH" ]; then
            doppler secrets set LINKEDIN_REFRESH_TOKEN="$NEW_REFRESH" --silent
            echo "Persisted refreshed LINKEDIN_REFRESH_TOKEN to Doppler."
          fi
