name: Meta Video Metrics → Google Sheet

# Once per day, refresh the agency-facing Google Sheet of Meta VIDEO-ad metrics
# (delivery + video engagement, incl. completion rate + avg watch time) for the
# tracked locales. The script first rebuilds `meta_creative_format_daily` from
# the Meta Marketing API, then writes the sheet, so this job is self-sufficient
# and does not depend on the daily_feedback job's ordering.
#
# Target sheet id lives in Doppler as META_VIDEO_GSHEET_ID (dev + prd). The
# sheet must already exist — create it once with:
#   doppler run -- python3 scripts/refresh_meta_video_gsheet.py --create \
#       --share-email <you> --title "Meta Video Ad Metrics — Agency View"
#
# NOTE: GitHub only runs scheduled workflows from the DEFAULT branch, so this
# cron activates once merged to main.

on:
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC daily — after daily_feedback (08:30) but self-sufficient regardless
  workflow_dispatch: {}

jobs:
  refresh:
    name: Refresh Meta video metrics sheet
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Write Google credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- bash -c 'echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json'

      - name: Refresh Meta video Google Sheet
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "Running: doppler run -- python3 scripts/refresh_meta_video_gsheet.py --window 30"
          doppler run -- python3 scripts/refresh_meta_video_gsheet.py --window 30

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-video-gsheet-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
