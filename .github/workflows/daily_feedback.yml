name: Daily Feedback (Phase 6)

# Once per day, walk every launched ramp and produce a fresh per-campaign
# recommendation row in `ramp_recommendations`. The console reads these out
# of Postgres and renders Accept / Reject buttons on the ramp detail page.
#
# Pre-existing `smart_ramp_poller.yml` has its own daily 08:00 UTC cron that
# refreshes registry metrics (impressions / spend / etc) via the legacy
# weekly_feedback_loop path. This workflow runs 30 minutes AFTER that one
# so it reads fresh metrics. Don't collapse them — the metric refresh path
# pulls Redash; this path is registry-only + writes Postgres.

on:
  schedule:
    - cron: "30 8 * * *"  # 08:30 UTC daily — runs ~30min after smart_ramp_poller's daily metrics refresh
  workflow_dispatch:
    inputs:
      ramp_id:
        description: "Score a single ramp instead of all launched ramps"
        required: false
        default: ""

jobs:
  recommend:
    name: Score campaigns + upsert recommendations
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Run daily feedback pass
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.ramp_id }}" ]; then
            ARGS="--ramp-id ${{ github.event.inputs.ramp_id }}"
          fi
          echo "Running: doppler run -- python3 scripts/run_daily_feedback.py $ARGS"
          doppler run -- python3 scripts/run_daily_feedback.py $ARGS

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-feedback-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
