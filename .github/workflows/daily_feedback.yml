name: Daily Feedback (Phase 6)

# Once per day: (1) refresh live campaign metrics for all channels into
# Postgres, then (2) walk every launched ramp and produce a fresh per-campaign
# recommendation row in `ramp_recommendations`. The console reads both out of
# Postgres (dashboard rollup + per-ramp Accept / Reject).
#
# The metrics refresh (scripts/refresh_metrics.py) runs FIRST in this same job
# so the recommendation pass reads fresh numbers. It replaces the old claim
# that smart_ramp_poller refreshed metrics at 08:00 — it never did; the
# weekly_feedback_loop path was unscheduled, so metrics went stale.

on:
  schedule:
    - cron: "30 8 * * *"  # 08:30 UTC daily — runs ~30min after smart_ramp_poller's daily metrics refresh
  workflow_dispatch:
    inputs:
      ramp_id:
        description: "Score a single ramp instead of all launched ramps"
        required: false
        default: ""

jobs:
  recommend:
    name: Score campaigns + upsert recommendations
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Refresh campaign metrics (all channels)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Non-fatal: a metrics hiccup on one platform must not block the
        # recommendation pass below. Sources campaigns from Postgres, so it
        # covers every current campaign regardless of the committed registry.
        run: |
          echo "Running: doppler run -- python3 scripts/refresh_metrics.py --window 7"
          doppler run -- python3 scripts/refresh_metrics.py --window 7 \
            || echo "metrics refresh failed (non-fatal) — continuing to recommendations"

      - name: Run daily feedback pass
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          # Close the angle-loop: let the daily pass EXECUTE the safe, high-
          # confidence angle actions (pause losing-angle Meta ads → Meta
          # reallocates to the winner; increase-only budget bumps on the winner,
          # capped at ANGLE_SCALE_MAX_CENTS; creative "refresh" drafts). Losing
          # angles are still surfaced as console recommendations too. Prod-only
          # override — config.py default stays "false" so local runs / tests
          # never touch live campaigns. To revert to recommend-only, delete this
          # line (or set it in Doppler prd, which wins over this env).
          ANGLE_AUTO_ACT_ENABLED: "true"
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.ramp_id }}" ]; then
            ARGS="--ramp-id ${{ github.event.inputs.ramp_id }}"
          fi
          echo "Running: doppler run -- python3 scripts/run_daily_feedback.py $ARGS"
          doppler run -- python3 scripts/run_daily_feedback.py $ARGS

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-feedback-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
