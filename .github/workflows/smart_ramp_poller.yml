name: Smart Ramp Poller

on:
  schedule:
    # Every 5 minutes, 24/7 — GitHub Actions cron is UTC.
    # Tightened from 15 → 5 min on 2026-05-23 so prep fires within ~5 min of
    # a Smart Ramp being raised (was up to 15 min latency before). The poller
    # is idempotent: when no new ramps exist the tick is a single Smart Ramp
    # API call + Postgres status check, costing well under a second of CPU.
    - cron: "*/5 * * * *"
    # Daily feedback run at 08:00 UTC — pulls LinkedIn metrics, scores campaigns,
    # updates campaign_registry.xlsx, deprecates underperformers
    - cron: "0 8 * * *"
  # Allow manual trigger from GitHub Actions UI for testing / forced runs
  workflow_dispatch:
    inputs:
      ramp_id:
        description: "Force-process a specific ramp ID (e.g. GMR-0016). Leave blank to process all new ramps."
        required: false
        default: ""
      dry_run:
        description: "Run in dry-run mode (no LinkedIn campaigns created)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      regen_mode:
        description: "Regen-only: skip Stage A/B/C; re-run gen + Drive upload + ad attach ONLY for registry rows with empty creative_image_path. Reads qc_rule_overrides from Postgres to suppress flagged QC rules for this ramp."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      force:
        description: "Force prep re-run for ramp_id even when a ramp_decisions row already exists (recovers ramps stuck on stale awaiting_approval from prior failures). Requires ramp_id. Overwrites cohort_briefs + cohort_icp via ON_CONFLICT."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      only_channel:
        description: "Per-channel manual launch (feature #3): restrict this run to one channel and bypass the ramp status machine (channel_locks guard concurrency). Requires ramp_id + a prior approval. Blank = all approved channels."
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "linkedin"
          - "meta"
          - "google"
      only_cohort:
        description: "New-cohort scope (feature 010): restrict this run to a single Smart Ramp cohort id. Blank + a channel = scoped LAUNCH of that cohort; set + no channel = scoped additive PREP of that cohort (no ramp-wide wipe, ramp status untouched). Requires ramp_id."
        required: false
        default: ""
      only_locales:
        description: "Restrict this run to specific BCP-47 locales, comma-separated (e.g. ko-KR,bn-IN,th-TH). Blank = all cohorts. Sets ONLY_LOCALES (main.py cohort filter)."
        required: false
        default: ""
      channels:
        description: "Comma-separated channel subset, e.g. linkedin,meta. Blank = all enabled platforms. Sets OUTLIER_CHANNELS. NOTE: the Meta arm is coupled to LinkedIn static — include linkedin when running meta."
        required: false
        default: ""
      replace:
        description: "Relaunch (replace): archive only_channel's existing campaigns for this ramp BEFORE creating fresh ones (no duplicates). Requires only_channel + ramp_id."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      verify_heal:
        description: "Verify-and-heal (piece C): after launch, archive any campaign/ad-set left with zero ads + flag (Slack + audit log). Default off while it bakes — enable per-run to validate, then flip the Doppler prd default on."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      skip_existing:
        description: "Per-cohort idempotency (config.SKIP_EXISTING_COHORT_CAMPAIGNS). 'true' (default) skips cohorts that already have a live campaign. Set 'false' for a one-off run that creates NEW campaigns ALONGSIDE the existing ones (no archive) — e.g. recreate a ramp's Meta set on a new creative template as PAUSED shadows of the running ones. Per-run only; never set globally in Doppler (would dup every ramp on scheduled ticks)."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  poll:
    name: Poll Smart Ramp & run pipeline
    runs-on: ubuntu-latest
    # Bumped 90 -> 180 (2026-06-19): a full-ramp recreate runs ~5 min/locale, so
    # a 17-locale i18n ramp (e.g. GMR-0023) takes ~85-90 min and was getting
    # cancelled at the old 90-min cap mid-run (ru-RU never created). 180 gives 2x
    # headroom for the largest ramps while still killing genuine runaway loops.
    timeout-minutes: 180  # max one ramp cycle; kills runaway image-gen loops

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: read

    steps:
      - name: Debug — show runner context
        run: |
          echo "Actor: ${{ github.actor }}"
          echo "Repo:  ${{ github.repository }}"
          echo "Ref:   ${{ github.ref }}"
          git --version

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Non-Latin creative overlays (Hindi/Bengali/Thai/Arabic/CJK/Hangul…):
      # libraqm0 = Pillow RAQM shaping; fonts-noto-* = glyph coverage. Without
      # these the compositor falls back to Inter and renders "?".
      - name: Install fonts + libraqm (non-Latin creative text)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libraqm0 fonts-noto-core fonts-noto-cjk fonts-noto-extra
          fc-list | grep -ci bengali | xargs -I{} echo "noto bengali faces: {}"  # non-fatal: surfaces missing Indic fonts (tofu guard reverts to English if absent)

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # actions/setup-python's pip cache restores certifi METADATA from
          # cache but occasionally not the cacert.pem payload. Force-reinstall
          # to guarantee the PEM bundle is on disk.
          pip install --force-reinstall --no-deps --no-cache-dir certifi
          python -c "import certifi, os; p = certifi.where(); print('certifi:', p, 'exists:', os.path.exists(p))"

      - name: Assert Pillow RAQM shaping (fail closed on missing libraqm)
        # Complex-script overlays (Bengali/Hindi/Thai/Arabic/CJK) need Pillow's
        # RAQM layout engine to shape correctly. Without libraqm the text renders
        # MISSHAPEN (matras out of order) — not tofu, so string checks + vision QC
        # can miss it. Fail here rather than ship garbled brand creatives.
        run: |
          python -c "from PIL import features; assert features.check('raqm'), 'Pillow lacks RAQM (libraqm) — complex-script creatives would render misshapen; fix the libraqm0 install step'; print('Pillow RAQM shaping: OK')"

      - name: Repoint SSL_CERT_FILE at certifi
        # actions/setup-python pre-sets SSL_CERT_FILE to a Python distribution
        # path that becomes stale once pip swaps packages around. httpx reads
        # this env var FIRST (httpx/_config.py:35) so even when certifi.where()
        # is valid, httpx still tries to load the stale path and raises
        # FileNotFoundError inside Anthropic client construction. Override the
        # env var to the freshly-installed certifi bundle so httpx + ssl get
        # the right path. Writing to $GITHUB_ENV makes it stick for ALL
        # subsequent steps (the actual poller invocation below).
        run: |
          CERT_PATH=$(python -c "import certifi; print(certifi.where())")
          echo "Repointing SSL_CERT_FILE: $CERT_PATH"
          test -f "$CERT_PATH" || { echo "certifi bundle missing"; exit 1; }
          echo "SSL_CERT_FILE=$CERT_PATH" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Restore processed_ramps state
        id: cache-state
        uses: actions/cache@v4
        with:
          path: data/processed_ramps.json
          key: processed-ramps-${{ github.run_id }}
          restore-keys: |
            processed-ramps-

      - name: Ensure data directory exists
        run: mkdir -p data logs

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      # Materialize the Google service-account key the same way launch.yml does.
      # Without this, SheetsClient() init throws → the registry logger silently
      # falls back to NullSheetsClient (no-op) and Drive creative upload fails,
      # so campaigns created by the poller never reach the registry Sheet /
      # Drive (this is exactly why GMR-0023's console came up empty).
      - name: Write Google credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- bash -c 'echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json'

      - name: Run poller
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          # Per-channel manual launch (feature #3). Read at config import time;
          # restricts the run to one channel + triggers the channel_locks
          # release path. Blank for normal (all-channel) runs.
          ONLY_CHANNEL: ${{ github.event.inputs.only_channel }}
          # New-cohort scope (feature 010). Read at config import time
          # (config.ONLY_COHORT); restricts the run to one Smart Ramp cohort id
          # (scoped additive prep when no channel, scoped launch with a channel).
          ONLY_COHORT: ${{ github.event.inputs.only_cohort }}
          # Locale scope (manual reruns): comma-separated BCP-47 locales; main.py
          # filters cohorts to these (config-import-time read). Blank = all.
          ONLY_LOCALES: ${{ github.event.inputs.only_locales }}
          # Channel subset (2026-05-20): comma-separated platforms; main.py
          # OUTLIER_CHANNELS override. Blank = all enabled. Meta needs linkedin.
          OUTLIER_CHANNELS: ${{ github.event.inputs.channels }}
          # Relaunch (replace): archive only_channel's existing campaigns before
          # creating fresh ones. Read at config import time (config.REPLACE_EXISTING).
          REPLACE_EXISTING: ${{ github.event.inputs.replace }}
          # Per-cohort idempotency (config.SKIP_EXISTING_COHORT_CAMPAIGNS). Blank
          # on scheduled ticks → config defaults to true (blank-safe parse). A
          # manual dispatch can pass "false" to create NEW campaigns alongside
          # existing ones (no archive) — used to stand up a fresh creative-template
          # set as PAUSED shadows of the running campaigns.
          SKIP_EXISTING_COHORT_CAMPAIGNS: ${{ github.event.inputs.skip_existing }}
          # Verify-and-heal (piece C). Empty on scheduled runs → config parses
          # it as false (gate off). A manual dispatch can flip it on for one
          # validation ramp. Once validated, set the Doppler prd default to
          # "true" so scheduled runs heal too.
          LAUNCH_VERIFY_ENABLED: ${{ github.event.inputs.verify_heal }}
        run: |
          ARGS="--once"

          # Specific ramp override (manual dispatch only)
          if [ -n "${{ github.event.inputs.ramp_id }}" ]; then
            ARGS="$ARGS --ramp-id ${{ github.event.inputs.ramp_id }}"
          fi

          # Dry-run logic:
          #   scheduled runs  → always live (no --dry-run)
          #   manual dispatch → respect the dry_run input (default: true)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # Regen-only mode: skips Stage A/B/C, re-runs gen for empty-creative
          # registry rows only, reads qc_rule_overrides from Postgres to
          # suppress reviewer-flagged QC rules for this ramp.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.regen_mode }}" = "true" ]; then
            ARGS="$ARGS --regen-mode"
          fi

          # Force mode: bypass the existing ramp_decisions gate-skip when
          # re-running a stuck ramp. Requires ramp_id.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "Running: doppler run -- python scripts/smart_ramp_poller.py $ARGS"
          doppler run -- python scripts/smart_ramp_poller.py $ARGS

      - name: Save processed_ramps state
        if: always()
        uses: actions/cache@v4
        with:
          path: data/processed_ramps.json
          key: processed-ramps-${{ github.run_id }}

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poller-log-${{ github.run_id }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
