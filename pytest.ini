[pytest]
# Per-test timeout via pytest-timeout (already in our stack — used to be passed
# via --timeout=30 ad-hoc which killed legitimately-slow integration tests).
#
# 120s gives ~25% headroom over the slowest currently-passing test
# (test_run_ramp_pipeline.py::test_both_modes_per_cohort runs the full pipeline
# loop with mocked I/O and takes ~93s). Catches genuine hangs without
# false-flagging slow integration coverage.
#
# Override per-run with `pytest --timeout=N` (or 0 to disable).
timeout = 120
